<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOKOTICE & REGION 2026</title>
    <style>
        :root {
            --bg: #ffffff;
            --primary: #2c3e50;
            --l1: #e74c3c; --l2: #3498db; --l333: #27ae60; --l666: #8e44ad; --trn: #95a5a6;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: #fff; overflow: hidden; touch-action: none; }
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #map-content { position: absolute; width: 12000px; height: 12000px; background: #fff; background-image: radial-gradient(#e5e5e5 1.5px, transparent 1.5px); background-size: 100px 100px; transform-origin: 0 0; }
        
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .route { fill: none; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
        .trn-line { stroke-dasharray: 20, 20; stroke-width: 8; opacity: 0.4; }
        
        .stop { position: absolute; width: 24px; height: 24px; background: #fff; border: 5px solid var(--primary); border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stop:hover { transform: translate(-50%, -50%) scale(1.4); border-color: #f1c40f; }
        .stop.hub { width: 40px; height: 40px; border-width: 8px; }
        
        .label { position: absolute; font-size: 15px; font-weight: 700; color: #2c3e50; background: rgba(255,255,255,0.95); padding: 3px 10px; border-radius: 8px; white-space: nowrap; transform: translate(-50%, 30px); pointer-events: none; z-index: 21; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        .top-bar { position: absolute; top: 20px; left: 20px; background: #fff; border: 2px solid #000; padding: 12px 20px; border-radius: 12px; pointer-events: auto; box-shadow: 6px 6px 0 #000; z-index: 1000; }
        #card { position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; background: #fff; border: 4px solid #000; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; transition: 0.5s; pointer-events: auto; z-index: 2000; }
        #card.active { bottom: 0; }
        
        .controls { position: absolute; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .btn { width: 60px; height: 60px; background: #000; color: #fff; border-radius: 15px; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; box-shadow: 4px 4px 0 #444; }
        .btn.active { background: #e74c3c; }
        
        .line-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; color: #fff; font-size: 13px; margin-right: 5px; font-weight: 800; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="map-content">
        <svg id="svg"></svg>
        <div id="stops"></div>
    </div>
</div>

<div class="top-bar">
    <div style="font-weight: 900; letter-spacing: 1px;">KOKOTICE <span style="color:#27ae60">REGION HUB</span></div>
    <input type="range" id="zoom" min="0.1" max="1.5" step="0.05" value="0.5" style="width:100%; margin-top:10px;">
</div>

<div class="controls">
    <button id="lock" class="btn" onclick="toggleLock()">🔓</button>
    <button class="btn" onclick="recenter()">⌂</button>
</div>

<div id="card">
    <div onclick="closeInfo()" style="float:right; font-size:35px; cursor:pointer;">×</div>
    <h2 id="st-n" style="margin:0 0 10px 0;">Zastávka</h2>
    <div id="st-b" style="margin-bottom: 15px;"></div>
    <div id="st-h" style="line-height: 1.5; color: #333; font-size: 16px; background: #f9f9f9; padding: 15px; border-left: 5px solid #000;"></div>
    <p style="font-size: 12px; color: #7f8c8d; margin-top: 15px;">Informační systém integrované dopravy Kokotice</p>
</div>

<script>
const DATA = {
    stops: [
        // MĚSTO
        { id: 'vzn', n: 'Centrální depo', x: 6000, y: 6000, l: ['1', 'TRN'], h: 'Moderní technologické centrum pro údržbu vozového parku. Součástí je i muzeum dopravy s historickými exponáty.' },
        { id: 'kfl', n: 'Obchodní čtvrť', x: 6500, y: 6000, l: ['1', '333'], h: 'Dynamická obchodní zóna. Nabízí široké spektrum nákupních možností a služeb v moderním prostředí s dostatkem zeleně.' },
        { id: 'nam', n: 'Náměstí Svobody', x: 7200, y: 6000, l: ['1', '2', '333', 'TRN'], hub: true, h: 'Hlavní reprezentativní uzel města. Ideální místo pro setkání, kulturní akce a přestup na všechny hlavní směry.' },
        { id: 'nad', n: 'Hlavní nádraží', x: 7800, y: 6000, l: ['1', '2', '333', '666', 'TRN'], hub: true, h: 'Zrekonstruovaný dopravní uzel s historickou budovou. Vlaky v depech jsou udržovány jako technické památky regionálního významu.' },
        
        // REGION
        { id: 'rit', n: 'Rezidence Řitka', x: 4000, y: 6000, l: ['333'], h: 'Klidná lokalita na okraji města, oblíbená pro svou blízkost k přírodě a novou výstavbu rodinných domů.' },
        { id: 'moc', n: 'Lázně Močůvky', x: 5000, y: 4000, l: ['333', 'TRN'], h: 'Rekreační oblast známá svými prameny a čistým vzduchem. Skvělé místo pro víkendový odpočinek a turistiku.' },
        { id: 'lht', n: 'Záhadná Lhota', x: 9000, y: 4500, l: ['333'], h: 'Poklidná vesnice s unikátní lidovou architekturou a malebným okolím, které láká k procházkám.' },
        { id: 'prd', n: 'Obec Prdelákovice', x: 10000, y: 10000, l: ['333', '666', 'TRN'], hub: true, h: 'Srdce regionu s bohatou historií. Obec je známá svými tradicemi, cyklostezkami a pohostinností místních obyvatel.' },
        { id: 'pek', n: 'Pekelný Důl', x: 11000, y: 11000, l: ['666'], h: 'Bývalá hornická osada s naučnou stezkou, která mapuje historii těžby v regionu. Cesta linkou 666 nabízí krásné výhledy do krajiny.' }
    ],
    routes: [
        { id: '1', s: ['vzn','kfl','nam','nad'], c: 'var(--l1)', off: -15 },
        { id: '2', s: ['nam','nad'], c: 'var(--l2)', off: 0 },
        { id: '333', s: ['rit','kfl','nam','nad', 'lht', 'prd'], c: 'var(--l333)', off: 15 },
        { id: '666', s: ['nad','prd','pek'], c: 'var(--l666)', off: -10 },
        { id: 'trn', s: ['vzn', 'moc', 'nam', 'nad', 'prd'], c: 'var(--trn)', off: 0, trn: true }
    ]
};

let scale = 0.5, posX = window.innerWidth/2 - 7000*scale, posY = window.innerHeight/2 - 6000*scale, isLock = false;
const map = document.getElementById('map-content');

function init() {
    const svg = document.getElementById('svg');
    DATA.routes.forEach(r => {
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.classList.add('route'); if(r.trn) p.classList.add('trn-line');
        p.setAttribute('stroke', r.c);
        let d = "";
        r.s.forEach((sid, i) => {
            const s = DATA.stops.find(x => x.id === sid);
            if(s) d += (i===0?'M':'L') + (s.x + r.off) + ' ' + (s.y + r.off);
        });
        p.setAttribute('d', d); svg.appendChild(p);
    });
    DATA.stops.forEach(s => {
        const d = document.createElement('div');
        d.className = 'stop' + (s.hub?' hub':'');
        d.style.left = s.x + 'px'; d.style.top = s.y + 'px';
        d.onclick = (e) => { e.stopPropagation(); show(s); };
        const l = document.createElement('div');
        l.className = 'label'; l.innerText = s.n;
        l.style.left = s.x + 'px'; l.style.top = s.y + 'px';
        document.getElementById('stops').appendChild(d);
        document.getElementById('stops').appendChild(l);
    });
    update();
}

function toggleLock() { isLock = !isLock; document.getElementById('lock').innerText = isLock ? '🔒' : '🔓'; document.getElementById('lock').classList.toggle('active', isLock); }
document.getElementById('zoom').oninput = function() { scale = parseFloat(this.value); update(); };

let isD = false, sX, sY;
const start = e => { if(isLock) return; isD = true; sX = (e.touches?e.touches[0].clientX:e.clientX) - posX; sY = (e.touches?e.touches[0].clientY:e.clientY) - posY; };
const move = e => { if(!isD || isLock) return; posX = (e.touches?e.touches[0].clientX:e.clientX) - sX; posY = (e.touches?e.touches[0].clientY:e.clientY) - sY; update(); };
window.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', () => isD = false);
window.addEventListener('touchstart', start); window.addEventListener('touchmove', move); window.addEventListener('touchend', () => isD = false);

function update() { map.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
function recenter() { scale = 0.5; posX = window.innerWidth/2 - 7000*scale; posY = window.innerHeight/2 - 6000*scale; update(); document.getElementById('zoom').value = 0.5; }
function show(s) {
    document.getElementById('st-n').innerText = s.n;
    document.getElementById('st-b').innerHTML = s.l.map(l => `<span class="line-tag" style="background:${getCol(l)}">${l}</span>`).join('');
    document.getElementById('st-h').innerText = s.h;
    document.getElementById('card').classList.add('active');
}
function getCol(l) { const r = DATA.routes.find(x => x.id === l); return r ? r.c : '#000'; }
function closeInfo() { document.getElementById('card').classList.remove('active'); }
init();
</script>
</body>
</html>

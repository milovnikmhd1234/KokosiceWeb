<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOKOTICE MAPS v8.0 - THE FULL EDITION</title>
    <style>
        :root {
            --bg: #ffffff;
            --line1: #e74c3c; --line2: #3498db; --line3: #f1c40f; 
            --line333: #27ae60; --line666: #8e44ad; --train: #000000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Arial Black', sans-serif; background: var(--bg);
            overflow: hidden; touch-action: none;
        }

        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #map-content {
            position: absolute; width: 15000px; height: 15000px;
            background-image: radial-gradient(#ddd 2px, transparent 2px);
            background-size: 150px 150px; transform-origin: 0 0;
        }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .route { fill: none; stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
        .train-route { stroke-dasharray: 40, 20; stroke-width: 10; }

        .stop {
            position: absolute; width: 22px; height: 22px;
            background: #fff; border: 5px solid #000; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 20; cursor: pointer;
        }
        .stop.hub { width: 45px; height: 45px; border-width: 9px; background: gold; }
        .stop.field { width: 14px; height: 14px; border-width: 3px; }

        .label {
            position: absolute; font-size: 16px; font-weight: 900;
            color: #000; background: rgba(255,255,255,0.9);
            padding: 2px 8px; border: 2px solid #000; border-radius: 4px;
            white-space: nowrap; transform: translate(-50%, 25px);
            pointer-events: none; z-index: 21;
        }

        /* --- GUI --- */
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        
        .side-menu {
            position: absolute; top: 15px; left: 15px; width: 280px;
            background: white; border: 4px solid #000; padding: 15px;
            pointer-events: auto; box-shadow: 8px 8px 0 #000;
        }

        #info-card {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: white; border-top: 6px solid #000; padding: 25px;
            box-sizing: border-box; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); pointer-events: auto;
        }
        #info-card.active { bottom: 0; }

        .controls { 
            position: absolute; right: 20px; bottom: 30px; 
            display: flex; flex-direction: column; gap: 12px; pointer-events: auto;
        }
        .btn {
            width: 65px; height: 65px; background: #000; color: #fff;
            border-radius: 12px; font-size: 30px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; border: none;
        }
        .btn.locked { background: #ff4757; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { background: #ff0000; } }

        .line-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; color: white; font-size: 14px; margin-right: 5px; margin-bottom: 5px; font-weight: bold; }

        .area-text { position: absolute; font-size: 180px; font-weight: 900; color: rgba(0,0,0,0.03); text-transform: uppercase; pointer-events: none; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="map-content">
        <div class="area-text" style="top: 5500px; left: 5500px;">CENTRUM</div>
        <div class="area-text" style="top: 8500px; left: 8500px;">PRDELÁKOVICE</div>
        <div class="area-text" style="top: 3000px; left: 3000px;">MOČŮVKY</div>
        <div class="area-text" style="top: 5500px; left: 2000px;">ŘITKA</div>
        <div class="area-text" style="top: 3500px; left: 8000px;">ZÁHADNÁ LHOTA</div>

        <svg id="svg-layer"></svg>
        <div id="stops-layer"></div>
    </div>
</div>

<div id="ui-container">
    <div class="side-menu">
        <h3 style="margin:0">KOKOTICE DISPEČINK</h3>
        <hr border="1">
        <input type="range" id="zoom-slider" min="0.1" max="1.5" step="0.05" value="0.4" style="width:100%">
        <p style="font-size: 11px; margin: 5px 0;">ZOOM: Posuvník marnosti</p>
        <div id="legend">
            <div style="color:var(--line1)">● L1: Červená (Dělnická)</div>
            <div style="color:var(--line2)">● L2: Modrá (Parky & Smažky)</div>
            <div style="color:var(--line333)">● L333: Zelená (Agro-venkov)</div>
            <div style="color:var(--line666)">● L666: Fialová (Expres Peklo)</div>
            <div style="color:var(--train)">● VLAK: Černá (Nefunguje)</div>
        </div>
    </div>

    <div class="controls">
        <button id="lock-btn" class="btn" onclick="toggleLock()">🔓</button>
        <button class="btn" onclick="recenter()">⌂</button>
    </div>

    <div id="info-card">
        <div onclick="closeInfo()" style="float:right; font-size:40px; cursor:pointer">×</div>
        <h2 id="st-name" style="margin-top:0">Zastávka</h2>
        <div id="st-badges"></div>
        <div id="st-humor" style="margin-top: 15px; background: #fffbe6; border: 3px dashed #000; padding: 15px; font-weight: bold;"></div>
    </div>
</div>

<script>
    const DATA = {
        stops: [
            // MĚSTO
            { id: 'vzn', n: 'VOZOVNA', x: 5500, y: 5500, l: ['1', 'TRN'], h: 'Tady se budí autobusy. Pokud sem dojedeš po desátý večer, řidič tě zamkne v garáži a musíš mu čistit výfuk.' },
            { id: 'skl', n: 'ZŠ KOKOTICE', x: 5800, y: 5500, l: ['1'], h: 'Tady děti brečí, protože musí do školy, a dospělí brečí, protože musí do práce. Symbióza utrpení.' },
            { id: 'sid', n: 'SÍDLIŠTĚ MARNOST', x: 6100, y: 5200, l: ['1', '3'], h: 'Místo, kde i holubi berou antidepresiva. Ideální pro nákup drog nebo dostání přes držku.' },
            { id: 'kfl', n: 'KAUFLAND', x: 6400, y: 5500, l: ['1', '333'], h: 'Aréna smrti. Pokud nemáš slevový leták, jsi lovná zvěř. Pozor na babičky s berlemi, jsou vycvičené v boji zblízka.' },
            { id: 'nam', n: 'NÁMĚSTÍ OSVOBOZENÍ', x: 7000, y: 5500, l: ['1', '2', '3', '333', 'TRN'], hub: true, h: 'Srdce města. Smrdí to tu kebabem, močí a falešnou nadějí. 1 a 2 se tu kříží, aby lidi mohli přestoupit z jedné chyby na druhou.' },
            { id: 'nad', n: 'HLAVNÍ NÁDRAŽÍ', x: 7500, y: 5500, l: ['1', '2', 'TRN', '333', '666'], hub: true, h: 'Zde končí hygiena a začíná dobrodružství. Vzduch je z 80% tvořen výpary z levného vína. Bageta z automatu je starší než samotná česká státnost.' },
            { id: 'pru', n: 'PRŮMYSLOVÁ ZÓNA', x: 8000, y: 5500, l: ['1'], h: 'Lidská masomlejnka. Tady vyměníš 8 hodin života za pár drobných na pivo.' },
            
            // OBCE & MEZIZASTÁVKY
            { id: 'rit', n: 'ŘITKA', x: 3000, y: 5500, l: ['333'], h: 'Doslova prdel světa. Pokud jsi dojel až sem, tak jsi buď zaspal, nebo jsi fakt v koncích.' },
            { id: 'fld1', n: 'U HNOJIŠTĚ (Znamení)', x: 4000, y: 5500, l: ['333'], field: true, h: 'Zastávka na znamení. Pokud nezamáváš jako o život, řidič se ti vysměje a přidá plyn.' },
            { id: 'uje_s', n: 'SMRADLAVÝ ÚJEZDEC', x: 4800, y: 5500, l: ['333', 'TRN'], h: 'Vzduch je tu tak hustý, že se dá krájet a prodávat jako brikety. Místní svítí ve tmě.' },
            { id: 'moc', n: 'MOČŮVKY', x: 4500, y: 3000, l: ['333', 'TRN'], h: 'Název odpovídá kvalitě místní spodní vody. Jediný důvod k výstupu je, že autobus začal hořet.' },
            { id: 'fld2', n: 'U ZCHLÍPLÉ KOZY', x: 9000, y: 7500, l: ['333'], field: true, h: 'Tady chcípl pes a o kus dál i ta koza. Nic tu není, jen ticho a strach.' },
            { id: 'lht', n: 'ZÁHADNÁ LHOTA', x: 9500, y: 4000, l: ['333'], h: 'Záhada je, proč sem vůbec něco jede. Nikdo tu nikdy nenastoupil ani nevystoupil.' },
            { id: 'prd', n: 'PRDELÁKOVICE', x: 10000, y: 10000, l: ['TRN', '333', '666'], hub: true, h: 'Zde lišky dávají dobrou noc pervitinem. Konečná stanice existence. Vlak sem jede hodinu, ale mentálně zestárneš o deset let.' },
            { id: 'pek', n: 'PEKELNÝ DŮL', x: 11500, y: 11500, l: ['666'], h: 'Tady topí 24/7. Linka 666 sem vozí politiky a revizory.' }
        ],
        routes: [
            { id: '1', s: ['vzn','skl','sid','kfl','nam','nad','pru'], c: 'var(--line1)', off: -15 },
            { id: '2', s: ['nam','nad'], c: 'var(--line2)', off: 0 },
            { id: '333', s: ['rit','fld1','uje_s','kfl','nam','nad','fld2', 'lht', 'prd'], c: 'var(--line333)', off: 10 },
            { id: '666', s: ['nad','prd','pek'], c: 'var(--line666)', off: -5 },
            { id: 'trn', s: ['vzn', 'uje_s', 'nam', 'nad', 'moc', 'prd'], c: 'var(--train)', off: 0, trn: true }
        ]
    };

    let scale = 0.4, posX = window.innerWidth/2 - 7000*scale, posY = window.innerHeight/2 - 6000*scale;
    let isLocked = false;
    const world = document.getElementById('map-content');

    function init() {
        const svg = document.getElementById('svg-layer');
        DATA.routes.forEach(r => {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.classList.add('route'); if(r.trn) p.classList.add('train-route');
            p.setAttribute('stroke', r.c);
            let d = "";
            r.s.forEach((sid, i) => {
                const s = DATA.stops.find(x => x.id === sid);
                if(s) d += (i===0?'M':'L') + (s.x + r.off) + ' ' + (s.y + r.off);
            });
            p.setAttribute('d', d); svg.appendChild(p);
        });

        const layer = document.getElementById('stops-layer');
        DATA.stops.forEach(s => {
            const dot = document.createElement('div');
            dot.className = 'stop' + (s.hub?' hub':'') + (s.field?' field':'');
            dot.style.left = s.x + 'px'; dot.style.top = s.y + 'px';
            dot.onclick = (e) => { e.stopPropagation(); showStop(s); };
            const lbl = document.createElement('div');
            lbl.className = 'label'; lbl.innerText = s.n;
            lbl.style.left = s.x + 'px'; lbl.style.top = s.y + 'px';
            layer.appendChild(dot); layer.appendChild(lbl);
        });
        update();
    }

    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lock-btn').innerText = isLocked ? '🔒' : '🔓';
        document.getElementById('lock-btn').classList.toggle('locked', isLocked);
    }

    document.getElementById('zoom-slider').oninput = function() {
        scale = parseFloat(this.value);
        update();
    };

    let isDrag = false, startX, startY;
    const start = e => {
        if(isLocked) return;
        isDrag = true;
        startX = (e.touches?e.touches[0].clientX:e.clientX) - posX;
        startY = (e.touches?e.touches[0].clientY:e.clientY) - posY;
    };
    const move = e => {
        if(!isDrag || isLocked) return;
        posX = (e.touches?e.touches[0].clientX:e.clientX) - startX;
        posY = (e.touches?e.touches[0].clientY:e.clientY) - startY;
        update();
    };
    window.addEventListener('mousedown', start); window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => isDrag = false);
    window.addEventListener('touchstart', start); window.addEventListener('touchmove', move);
    window.addEventListener('touchend', () => isDrag = false);

    function update() { world.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
    function recenter() { scale = 0.4; posX = window.innerWidth/2 - 7000*scale; posY = window.innerHeight/2 - 6000*scale; update(); document.getElementById('zoom-slider').value = 0.4; }
    
    function showStop(s) {
        document.getElementById('st-name').innerText = s.n;
        document.getElementById('st-badges').innerHTML = s.l.map(l => `<span class="line-badge" style="background:${getCol(l)}">${l}</span>`).join('');
        document.getElementById('st-humor').innerText = "HLÁŠENÍ: " + s.h;
        document.getElementById('info-card').classList.add('active');
    }
    function getCol(l) {
        const r = DATA.routes.find(x => x.id === l);
        return r ? r.c : '#333';
    }
    function closeInfo() { document.getElementById('info-card').classList.remove('active'); }

    init();
</script>
</body>
</html>

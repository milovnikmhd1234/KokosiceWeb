<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOKOTICE MAPS v6.0 - THE GIGACHAD EDITION</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --text: #111111;
            --line1: #e74c3c; /* Červená - Městská */
            --line2: #3498db; /* Modrá - Městská */
            --line3: #f1c40f; /* Žlutá - Studentská */
            --line333: #27ae60; /* Zelená - Regionální */
            --line666: #8e44ad; /* Fialová - Expres do pekel */
            --lineN5: #34495e; /* Šedá - Noční vyhlídka */
            --train: #000000; /* Černá - Železnice */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg); color: var(--text);
            overflow: hidden; touch-action: none;
        }

        #map-viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; }

        #map-content {
            position: absolute; width: 12000px; height: 12000px;
            background-color: #ffffff;
            background-image: 
                linear-gradient(#f2f2f2 2px, transparent 2px),
                linear-gradient(90deg, #f2f2f2 2px, transparent 2px);
            background-size: 200px 200px;
            transform-origin: 0 0;
        }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        .route { fill: none; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; transition: opacity 0.3s; }
        .train-route { stroke-dasharray: 30, 20; stroke-width: 10; opacity: 1; }
        .night-route { stroke-dasharray: 10, 10; stroke-width: 6; opacity: 0.6; }
        
        .stop {
            position: absolute; width: 22px; height: 22px;
            background: #fff; border: 5px solid #000;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 20; pointer-events: auto; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .stop.hub { width: 40px; height: 40px; border-width: 8px; }
        .stop.train-stop { border-radius: 4px; width: 25px; height: 25px; }

        .label {
            position: absolute; font-size: 16px; font-weight: 800;
            color: #000; background: rgba(255,255,255,0.9);
            padding: 2px 8px; border-radius: 4px; border: 1px solid #ddd;
            white-space: nowrap; transform: translate(-50%, 25px);
            pointer-events: none; z-index: 21;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        /* --- GUI --- */
        #info-card {
            position: absolute; bottom: -100%; left: 50%; 
            transform: translateX(-50%); width: 95%; max-width: 600px;
            background: #ffffff; border-radius: 25px 25px 0 0;
            padding: 30px; box-sizing: border-box;
            transition: bottom 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: auto; border: 4px solid #000;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.2);
            z-index: 5000;
        }
        #info-card.active { bottom: 0; }

        .close-btn { 
            position: absolute; top: 20px; right: 25px; 
            font-size: 32px; cursor: pointer; font-weight: 900;
            color: #000;
        }

        .controls { 
            position: absolute; right: 25px; bottom: 40px; 
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .btn {
            pointer-events: auto; width: 70px; height: 70px;
            background: #000; color: #fff; border-radius: 20px;
            font-size: 35px; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .badge {
            display: inline-block; padding: 6px 15px; border-radius: 10px;
            margin-right: 8px; font-weight: 900; font-size: 16px; border: 3px solid #000;
            color: #000; margin-bottom: 5px;
        }

        .region-name {
            position: absolute; font-size: 200px; font-weight: 900;
            color: rgba(0,0,0,0.02); pointer-events: none; text-transform: uppercase;
            white-space: nowrap;
        }

        .humor-box {
            margin-top: 25px; padding: 20px; 
            border: 3px dashed #000; background: #fffbe6;
            border-radius: 15px; position: relative;
        }
        .humor-box::before {
            content: "HLÁŠENÍ DISPEČINKU";
            position: absolute; top: -12px; left: 20px;
            background: #000; color: #fff; padding: 2px 10px;
            font-size: 12px; font-weight: 900;
        }
    </style>
</head>
<body>

<div id="map-viewport">
    <div id="map-content">
        <div class="region-name" style="top: 5500px; left: 5500px;">KOKOTICE CITY</div>
        <div class="region-name" style="top: 8500px; left: 8500px;">PRDELÁKOVICE</div>
        <div class="region-name" style="top: 3000px; left: 3000px;">MOČŮVKY</div>
        <div class="region-name" style="top: 6000px; left: 1500px;">ŘITKA</div>
        <div class="region-name" style="top: 4000px; left: 7500px;">ZÁHADNÁ LHOTA</div>

        <svg id="svg-layer"></svg>
        <div id="stops-layer"></div>
    </div>
</div>

<div class="controls">
    <div class="btn" onclick="zoom(1.5)">+</div>
    <div class="btn" onclick="zoom(0.5)">−</div>
    <div class="btn" onclick="recenter()">⌂</div>
</div>

<div id="info-card">
    <div class="close-btn" onclick="closeInfo()">×</div>
    <h2 id="st-name" style="margin-top: 0; font-size: 32px; letter-spacing: -1px;">Název zastávky</h2>
    <div id="st-badges"></div>
    <div id="st-humor" class="humor-box"></div>
    <p style="margin-top: 15px; font-size: 14px; color: #666;">Bezbariérový přístup: Pouze pokud umíte levitovat.</p>
</div>

<script>
    const CONFIG = {
        stops: [
            // --- CENTRUM KOKOTICE ---
            { id: 'vzn', n: 'VOZOVNA', x: 5500, y: 5500, l: ['1', 'TRN'], h: 'Tady autobusy spí a řidiči nadávají na život. Smrdí to tu jako v ropné rafinerii po výbuchu.' },
            { id: 'skl', n: 'ZŠ KOKOTICE', x: 5750, y: 5500, l: ['1'], h: 'Místo, kde děti ztrácejí sny a učitelé trpělivost. Pokud uvidíš revizora, tvař se jako prvňáček.' },
            { id: 'sid', n: 'SÍDLIŠTĚ MARNOST', x: 6000, y: 5300, l: ['1', '3', 'N5'], h: 'Kombinace betonu a deprese. Ideální místo na křížení linek 1 a 3 a taky na rychlou loupež.' },
            { id: 'kfl', n: 'KAUFLAND', x: 6250, y: 5500, l: ['1', '333', 'N5'], h: 'Zde se bojuje o zlevněný bůček. Kdo nemá ostré lokty, ten tu nepřežije ranní nálet důchodců.' },
            { id: 'nam', n: 'NÁMĚSTÍ OSVOBOZENÍ', x: 6700, y: 5500, l: ['1', '2', '3', '333', 'TRN', 'N5'], hub: true, h: 'Zlatý uzel. Tady se 1 a 2 potkávají a lidi tu čekají na spoje, které mají 20 minut zpoždění.' },
            { id: 'nad', n: 'HLAVNÍ NÁDRAŽÍ', x: 7200, y: 5500, l: ['1', '2', 'TRN', '333', '666', 'N5'], hub: true, h: 'Vstup do jiného světa. Pokud přežiješ bagetu z automatu, jsi nesmrtelný. Vlaky odsud jedou všude, ale nikam včas.' },
            { id: 'pru', n: 'PRŮMYSLOVÁ ZÓNA', x: 7600, y: 5500, l: ['1'], h: 'Zde se vyrábí věci, které nikdo nepotřebuje, lidmi, kteří by radši byli v hospodě.' },

            // --- MĚSTSKÉ LINKY ---
            { id: 'zam', n: 'ZÁMECKÝ PARK', x: 6700, y: 5100, l: ['2', 'N5'], h: 'Krásná příroda, pokud ignorujete ty injekční stříkačky v pískovišti. Linka 2 tudy projíždí jen aby se neřeklo.' },
            { id: 'div', n: 'DIVADLO HRŮZY', x: 6700, y: 5300, l: ['2'], h: 'Kulturní stánek, kde největší drama probíhá venku na zastávce mezi bezdomovci.' },
            { id: 'nak', n: 'NÁKUPNÍ ZÓNA JIH', x: 6700, y: 6000, l: ['2', '333'], h: 'Ráj pro lidi s prázdnou hlavou a plnou kreditkou. Parkoviště je větší než celé centrum města.' },
            { id: 'uni', n: 'UNIVERZITA', x: 7200, y: 6000, l: ['3'], h: 'Zde se budoucí inteligence národa učí, jak přežít měsíc s pěti stovkami v kapse.' },
            { id: 'kol', n: 'KOLEJE (Hnízdo hříchu)', x: 7200, y: 6400, l: ['3'], h: 'Zde linka 3 končí. Pokud vstoupíš dovnitř, okamžitě dostaneš kocovinu jen z toho vzduchu.' },

            // --- REGIONÁLNÍ DÍRY ---
            { id: 'rit', n: 'ŘITKA', x: 4000, y: 5500, l: ['333'], h: 'Název zastávky přesně popisuje tvou životní situaci, pokud jsi nucen tu vystoupit.' },
            { id: 'uje_s', n: 'SMRADLAVÝ ÚJEZDEC', x: 4800, y: 5500, l: ['333', 'TRN'], h: 'Místní chemická továrna zajišťuje, že se tu lidi dožívají průměrně 40 let, ale svítí ve tmě.' },
            { id: 'moc', n: 'MOČŮVKY', x: 5000, y: 3500, l: ['333', 'TRN'], h: 'Před vystupováním doporučujeme nasadit plynovou masku. Místní rybník je v podstatě kyselina.' },
            { id: 'lht', n: 'ZÁHADNÁ LHOTA', x: 8500, y: 4000, l: ['333'], h: 'Zastávka uprostřed ničeho. Řidič autobusu 333 tu zastavuje jen když má halucinace.' },
            { id: 'kzh', n: 'KOZÍ HŘBET', x: 4500, y: 7500, l: ['666'], h: 'Tady se kozy pasou na zbytcích vyhozených pneumatik. Drsný kraj pro drsné linky.' },
            
            // --- PRDELÁKOVICE A PEKLO ---
            { id: 'prd', n: 'PRDELÁKOVICE', x: 9500, y: 9500, l: ['TRN', '666', '333'], hub: true, h: 'Konečná stanice světa. Tady končí asfalt, naděje i Wi-Fi signál. Vlak sem jede věčnost.' },
            { id: 'pek', n: 'PEKELNÝ DŮL', x: 10500, y: 10500, l: ['666'], h: 'Linka 666 tě doveze až sem. Je tu pořádný teplo, ale aspoň tu nejezdí revizoři.' },
            { id: 'kok', n: 'HRAD KOKOTÍN', x: 9500, y: 8000, l: ['TRN'], h: 'Historická zřícenina, která vypadá líp než hlavní nádraží v Kokoticích.' }
        ],
        routes: [
            { id: '1', s: ['vzn','skl','sid','kfl','nam','nad','pru'], c: '#e74c3c', off: -12 },
            { id: '2', s: ['zam','div','nam','nad','nak'], c: '#3498db', off: 0 },
            { id: '3', s: ['sid','nam','uni','kol'], c: '#f1c40f', off: 12 },
            { id: '333', s: ['rit','uje_s','kfl','nam','nad','nak','moc','lht','prd'], c: '#27ae60', off: -6 },
            { id: '666', s: ['kzh','nad','prd','pek'], c: '#8e44ad', off: 6 },
            { id: 'n5', s: ['sid','kfl','nam','nad','zam'], c: '#34495e', off: 0, night: true },
            { id: 'trn', s: ['vzn','uje_s','nam','nad','moc','kok','prd'], c: '#000000', off: 0, train: true }
        ]
    };

    let scale = 0.4, posX = window.innerWidth/2 - 6700*scale, posY = window.innerHeight/2 - 5500*scale;
    const content = document.getElementById('map-content');

    function init() {
        const svg = document.getElementById('svg-layer');
        // Render tras s dynamickým offsetem
        CONFIG.routes.forEach(r => {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.classList.add('route');
            if(r.train) p.classList.add('train-route');
            if(r.night) p.classList.add('night-route');
            p.setAttribute('stroke', r.c);
            
            let d = "";
            r.s.forEach((sid, i) => {
                const s = CONFIG.stops.find(x => x.id === sid);
                if(s) {
                    const ox = r.off;
                    const oy = r.off;
                    d += (i===0?'M':'L') + (s.x + ox) + ' ' + (s.y + oy);
                }
            });
            p.setAttribute('d', d);
            svg.appendChild(p);
        });

        // Render zastávek
        const layer = document.getElementById('stops-layer');
        CONFIG.stops.forEach(s => {
            const stop = document.createElement('div');
            stop.className = 'stop' + (s.hub ? ' hub' : '') + (s.l.includes('TRN') ? ' train-stop' : '');
            stop.style.left = s.x + 'px'; stop.style.top = s.y + 'px';
            stop.onclick = (e) => { e.stopPropagation(); showInfo(s); };
            
            const lbl = document.createElement('div');
            lbl.className = 'label'; lbl.innerText = s.n;
            lbl.style.left = s.x + 'px'; lbl.style.top = s.y + 'px';
            
            layer.appendChild(stop);
            layer.appendChild(lbl);
        });
        update();
    }

    // INTERAKCE (MOUSE + TOUCH)
    let isDrag = false, startX, startY;
    const evStart = e => { 
        isDrag = true; 
        startX = (e.touches?e.touches[0].clientX:e.clientX) - posX;
        startY = (e.touches?e.touches[0].clientY:e.clientY) - posY;
    };
    const evMove = e => {
        if(!isDrag) return;
        posX = (e.touches?e.touches[0].clientX:e.clientX) - startX;
        posY = (e.touches?e.touches[0].clientY:e.clientY) - startY;
        update();
    };
    window.addEventListener('mousedown', evStart); window.addEventListener('mousemove', evMove);
    window.addEventListener('mouseup', () => isDrag = false);
    window.addEventListener('touchstart', evStart); window.addEventListener('touchmove', evMove);
    window.addEventListener('touchend', () => isDrag = false);

    function update() { content.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
    function zoom(f) { scale *= f; update(); }
    function recenter() { scale = 0.4; posX = window.innerWidth/2 - 6700*scale; posY = window.innerHeight/2 - 5500*scale; update(); }

    function showInfo(s) {
        document.getElementById('st-name').innerText = s.n;
        document.getElementById('st-badges').innerHTML = s.l.map(l => `<span class="badge" style="background:${getColor(l)}">${l}</span>`).join('');
        document.getElementById('st-humor').innerText = s.h;
        document.getElementById('info-card').classList.add('active');
    }
    function getColor(l) {
        const r = CONFIG.routes.find(x => x.id.toLowerCase() === l.toLowerCase());
        return r ? r.c : '#eee';
    }
    function closeInfo() { document.getElementById('info-card').classList.remove('active'); }

    init();
</script>
</body>
</html>
